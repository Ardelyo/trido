name: Build & Publish Demo Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Windows .exe installer ─────────────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend + Electron (Windows)
        run: npm run build:electron:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-release/*.exe
          retention-days: 1

  # ── macOS .dmg ─────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend + Electron (macOS)
        run: npm run build:electron:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist-release/*.dmg
          retention-days: 1

  # ── Linux .AppImage ────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend + Electron (Linux)
        run: npm run build:electron:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist-release/*.AppImage
          retention-days: 1

  # ── Portable ZIP (Node.js required, all platforms) ─────────────────────────
  build-zip:
    name: Build Portable ZIP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build

      - name: Create start.bat (Windows)
        run: |
          cat > start.bat << 'EOF'
          @echo off
          title Trido - AI Digital Classroom
          color 0B
          echo.
          echo  =========================================
          echo   Trido - AI-Powered Digital Classroom
          echo  =========================================
          echo.
          where node >nul 2>&1
          if %errorlevel% neq 0 (
            echo [ERROR] Node.js not found. Download from https://nodejs.org
            pause
            exit /b 1
          )
          echo [1/3] Node.js found.
          echo [2/3] Installing dependencies...
          call npm install --omit=dev --silent
          echo [3/3] Starting server...
          echo.
          echo  Open: http://localhost:3000
          echo  Press Ctrl+C to stop.
          echo.
          start "" /b cmd /c "timeout /t 3 /nobreak >nul && start http://localhost:3000"
          npm start
          pause
          EOF

      - name: Create start.sh (macOS/Linux)
        run: |
          cat > start.sh << 'EOF'
          #!/usr/bin/env bash
          set -e
          echo ""
          echo " Trido — AI Digital Classroom"
          echo " ============================="
          echo ""
          command -v node &>/dev/null || { echo "[ERROR] Node.js not found. Install from https://nodejs.org"; exit 1; }
          echo "[1/3] Node.js $(node --version) found."
          echo "[2/3] Installing dependencies..."
          npm install --omit=dev --silent
          echo "[3/3] Starting server..."
          echo ""
          echo " Open: http://localhost:3000"
          echo " Press Ctrl+C to stop."
          echo ""
          (sleep 3 && (xdg-open http://localhost:3000 2>/dev/null || open http://localhost:3000 2>/dev/null || true)) &
          npm start
          EOF
          chmod +x start.sh

      - name: Package portable ZIP
        run: |
          mkdir -p release-zip
          cp -r dist release-zip/
          cp -r server release-zip/
          cp -r utils release-zip/
          cp -r docs release-zip/
          cp server.ts constants.ts types.ts package.json package-lock.json release-zip/
          cp tsconfig.json tsconfig.server.json .env.example release-zip/
          cp start.bat start.sh release-zip/
          cat > release-zip/README.txt << 'EOF'
          Trido — AI Digital Classroom
          ============================

          QUICK START (No Install Required beyond Node.js):
          - Windows: Double-click start.bat
          - macOS/Linux: bash start.sh

          REQUIREMENTS:
          - Node.js v18+ (nodejs.org)
          - Gemini API key → set in .env file (copy .env.example → .env)

          The browser opens automatically at http://localhost:3000
          EOF
          cd release-zip && zip -r ../trido-portable-${{ github.ref_name }}.zip . && cd ..

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: portable-zip
          path: trido-portable-${{ github.ref_name }}.zip
          retention-days: 1

  # ── Publish Release ────────────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: [build-windows, build-macos, build-linux, build-zip]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: ls -lh release-files/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Trido ${{ github.ref_name }}"
          body: |
            ## 🎓 Trido — AI-Powered Digital Classroom

            ### ⬇️ Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | 🪟 Windows | `Trido Setup *.exe` | Installs Trido — just run the `.exe` |
            | 🍎 macOS | `Trido-*.dmg` | Open DMG, drag to Applications |
            | 🐧 Linux | `Trido-*.AppImage` | `chmod +x` then run |
            | 📦 All platforms | `trido-portable-*.zip` | Requires Node.js v18+ |

            ### 🚀 First Launch (Desktop Apps)
            1. **Install** the `.exe` / `.dmg` / `.AppImage` for your platform
            2. **Open Trido** — a setup screen appears
            3. **Paste your Gemini API key** (free at [aistudio.google.com](https://aistudio.google.com/apikey))
            4. Click **Start Trido** — the app opens, ready for demo!

            > ✅ No terminal, no Node.js, no configuration needed beyond an API key.

            ### ✨ Features
            - 🎨 AI-powered infinite canvas whiteboard
            - 🤖 Multi-model AI (Gemini, Ollama, Vertex AI)
            - 🎤 Voice input (Chrome/Edge)
            - 📊 Mindmap, Quiz, Timer, App Builder tools
            - 🔄 Real-time classroom collaboration
          files: release-files/*
          draft: false
          prerelease: false
