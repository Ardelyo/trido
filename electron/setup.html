<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trido — Setup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f172a;
    color: #f8fafc;
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 2rem;
    -webkit-app-region: drag;
  }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 1.5rem;
    padding: 2.5rem;
    max-width: 460px;
    width: 100%;
    -webkit-app-region: no-drag;
  }
  .logo {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #6366f1, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.25rem;
  }
  h2 { font-size: 1.1rem; color: #94a3b8; font-weight: 400; margin-bottom: 2rem; }
  label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.5rem; font-weight: 500; }
  input {
    width: 100%;
    background: #0f172a;
    border: 1px solid #334155;
    color: #f8fafc;
    padding: 0.75rem 1rem;
    border-radius: 0.75rem;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    font-family: monospace;
  }
  input:focus { border-color: #6366f1; }
  .hint {
    font-size: 0.78rem;
    color: #64748b;
    margin-top: 0.5rem;
    line-height: 1.5;
  }
  .hint a {
    color: #6366f1;
    text-decoration: none;
    cursor: pointer;
  }
  button {
    margin-top: 1.5rem;
    width: 100%;
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: white;
    border: none;
    padding: 0.9rem;
    border-radius: 0.75rem;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: #f87171; font-size: 0.82rem; margin-top: 0.75rem; display: none; }
  .loading { display: none; align-items: center; gap: 0.5rem; margin-top: 1rem; color: #94a3b8; font-size: 0.85rem; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #334155;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Trido</div>
    <h2>First-Time Setup</h2>

    <label for="apikey">Gemini API Key</label>
    <input id="apikey" type="password" placeholder="AIzaSy…" autocomplete="off" spellcheck="false" />
    <div class="hint">
      Get a free key at <a onclick="window.electronAPI.openExternal('https://aistudio.google.com/apikey')">aistudio.google.com/apikey</a>.
      Your key is stored locally and never sent anywhere except Google's API.
    </div>

    <div class="error" id="error"></div>

    <button id="btn" onclick="save()">Start Trido →</button>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      Starting server, please wait…
    </div>
  </div>

  <script>
    async function save() {
      const key = document.getElementById('apikey').value.trim();
      const btn = document.getElementById('btn');
      const err = document.getElementById('error');
      const loading = document.getElementById('loading');

      if (!key || key.length < 10) {
        err.style.display = 'block';
        err.textContent = 'Please enter a valid API key.';
        return;
      }

      err.style.display = 'none';
      btn.disabled = true;
      loading.style.display = 'flex';

      const result = await window.electronAPI.saveApiKey(key);
      if (!result.ok) {
        loading.style.display = 'none';
        btn.disabled = false;
        err.style.display = 'block';
        err.textContent = result.error || 'Failed to start. Check your key and try again.';
      }
    }

    document.getElementById('apikey').addEventListener('keydown', e => {
      if (e.key === 'Enter') save();
    });
  </script>
</body>
</html>
